<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Disease Form</title>
    <link rel="stylesheet" href="/static/simple.css">

    <style>
        #symptomSearch {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        /* 🔥 HEADER */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .logout-btn {
            background: red;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 6px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: darkred;
        }
    </style>
</head>
<body>

<div class="web-form-container">

    <!-- 🔥 HEADER WITH LOGOUT -->
    <div class="top-bar">
        <h2>Patient Information Form</h2>

        <div>
            <span style="margin-right:10px;">
                👋 {{ session['user'] }}
            </span>

            <a href="/logout">
                <button class="logout-btn">Logout</button>
            </a>
        </div>
    </div>

    <form method="POST">
        
        <div class="form-group">
            <label>Name</label>
            <input type="text" name="name" placeholder="Enter your name" required>
        </div>

        <div class="form-group">
            <label>Age</label>
            <input type="number" name="age" placeholder="Enter your age" required>
        </div>

        <!-- ✅ SYMPTOMS SECTION WITH SEARCH -->
        <div class="form-group">
            <label>Search Symptoms</label>
            <input type="text" id="symptomSearch" placeholder="Type to search symptoms...">

            <div id="symptomList" style="max-height:200px; overflow-y:auto; border:1px solid #ccc; padding:10px; border-radius:6px;">
                {% for symptom in symptoms %}
                    <div class="symptom-item">
                        <label>
                            <input type="checkbox" name="symptoms" value="{{ symptom }}">
                            {{ symptom }}
                        </label>
                    </div>
                {% endfor %}
            </div>
        </div>

        <div class="form-group">
            <label>Blood Group</label>
            <select name="blood" required>
                {% for bg in blood_groups %}
                    <option value="{{ bg }}">{{ bg }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" name="phone" placeholder="Enter phone number" required>
        </div>

        <button type="submit" class="btn-submit">Submit</button>
    </form>
</div>

<!-- ✅ JavaScript Search Logic -->
<script>
document.getElementById("symptomSearch").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();
    let symptoms = document.querySelectorAll(".symptom-item");

    symptoms.forEach(function(item) {
        let text = item.innerText.toLowerCase();
        if (text.includes(filter)) {
            item.style.display = "";
        } else {
            item.style.display = "none";
        }
    });
});
</script>

</body>
</html>
